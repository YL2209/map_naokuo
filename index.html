<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>坐标拾取 & 打卡范围预览 (夜间模式)</title>
    <style>
        :root {
            --primary: #4d94ff;
            --primary-light: #1a2a4a;
            --success: #00b578;
            --danger: #ff4d4f;
            --warning: #ff8f1f;
            --text: #e0e0e0;
            --text-secondary: #aaa;
            --border: #333;
            --bg-card: #1e1e2e;
            --bg-body: #12121a;
            --bg-white: #1a1a2e;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 36px rgba(0, 0, 0, 0.5);
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 92vh;
            max-height: 820px;
            min-height: 640px;
            border: 1px solid var(--border);
        }

        .header {
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 10px;
            background: var(--bg-white);
        }
        .header .title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .title .icon {
            font-size: 20px;
        }
        .status-badge {
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .status-badge.inside {
            background: rgba(0, 181, 120, 0.15);
            color: #00b578;
            border: 1.5px solid rgba(0, 181, 120, 0.3);
        }
        .status-badge.outside {
            background: rgba(255, 77, 79, 0.15);
            color: #ff4d4f;
            border: 1.5px solid rgba(255, 77, 79, 0.3);
        }
        .status-badge.unknown {
            background: rgba(212, 136, 6, 0.15);
            color: #d48806;
            border: 1.5px solid rgba(212, 136, 6, 0.3);
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .inside .status-dot { background: #00b578; }
        .outside .status-dot { background: #ff4d4f; }
        .unknown .status-dot { background: #d48806; }

        .map-wrap {
            flex: 1;
            position: relative;
            min-height: 260px;
        }
        #container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .map-tip-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #ddd;
            padding: 7px 15px;
            border-radius: 18px;
            font-size: 11px;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.4s, transform 0.4s;
            white-space: nowrap;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .map-tip-bar.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(-8px);
        }

        .crosshair-hint {
            position: absolute;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.15s;
            width: 32px;
            height: 32px;
        }
        .crosshair-hint.visible {
            opacity: 0.6;
        }
        .crosshair-hint.flash {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.3);
            transition: transform 0.18s, opacity 0.18s;
        }
        .crosshair-hint::before,
        .crosshair-hint::after {
            content: '';
            position: absolute;
            background: #4d94ff;
        }
        .crosshair-hint::before {
            width: 22px;
            height: 2px;
            top: 50%;
            left: 5px;
            transform: translateY(-50%);
        }
        .crosshair-hint::after {
            width: 2px;
            height: 22px;
            left: 50%;
            top: 5px;
            transform: translateX(-50%);
        }

        .bottom-panel {
            flex-shrink: 0;
            padding: 10px 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 48%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: var(--bg-white);
        }

        .address-search {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .address-search input {
            flex: 1;
            border: none;
            background: #252540;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            min-width: 120px;
            border: 1px solid #3a3a55;
            color: #ddd;
            transition: border-color 0.2s;
        }
        .address-search input::placeholder {
            color: #777;
        }
        .address-search input:focus {
            border-color: var(--primary);
        }
        .address-search .btn-xs {
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            border: 1.5px solid #3a3a55;
            background: #252540;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            gap: 4px;
            color: #ccc;
        }
        .address-search .btn-xs:active { transform: scale(0.93); background: #333; }
        .address-search .btn-xs.primary { background: var(--primary); color: #fff; border-color: var(--primary); }

        .fence-settings {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .fence-settings .input-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            flex: 1;
            min-width: 100px;
            border: 1px solid var(--border);
        }
        .fence-settings .input-group label {
            font-size: 10px;
            color: #999;
            white-space: nowrap;
            font-weight: 600;
        }
        .fence-settings .input-group input {
            border: none;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            width: 100%;
            min-width: 50px;
            outline: none;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            padding: 2px 4px;
        }
        .fence-settings .input-group input:focus { color: var(--primary); }

        .copy-row {
            display: flex;
            justify-content: center;
        }
        .copy-btn {
            padding: 7px 14px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            border: 1.5px solid #3a3a55;
            background: var(--bg-card);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #bbb;
        }
        .copy-btn:active { transform: scale(0.93); background: #333; }
        .copy-btn.copied {
            background: rgba(0, 181, 120, 0.15);
            border-color: #00b578;
            color: #00b578;
        }

        .radius-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .radius-row label {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
            font-weight: 600;
        }
        .radius-row input[type="range"] {
            flex: 2;
            min-width: 60px;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #3a3a55;
            outline: none;
            cursor: pointer;
        }
        .radius-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #1a1a2e;
            border: 2.5px solid var(--primary);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(77, 148, 255, 0.3);
            transition: transform 0.15s;
        }
        .radius-row input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.15); }
        .radius-input-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #252540;
            border-radius: 8px;
            padding: 4px 8px;
            border: 1.5px solid #3a3a55;
            flex: 0 0 auto;
            width: 90px;
        }
        .radius-input-wrap input {
            border: none;
            width: 100%;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            text-align: right;
            outline: none;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            background: transparent;
            padding: 2px 0;
        }
        .radius-input-wrap span {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            white-space: nowrap;
        }

        .info-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .info-item {
            flex: 1;
            min-width: 80px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            font-size: 11px;
            color: #999;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        .info-item .val {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
        }
        .info-item.danger .val { color: #ff4d4f; }
        .info-item.success .val { color: #00b578; }
        .info-item.warning .val { color: #d48806; }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 60px;
            padding: 11px 10px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            flex: 2;
            box-shadow: 0 4px 14px rgba(77, 148, 255, 0.35);
        }
        .btn-outline { background: var(--bg-card); border: 1.5px solid #3a3a55; color: #ccc; flex: 1; }
        .btn-warn { background: var(--bg-card); border: 1.5px solid rgba(212, 136, 6, 0.4); color: #d48806; flex: 1; }
        .btn:disabled { opacity: 0.45; pointer-events: none; }

        .records-panel {
            margin-top: 6px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }
        .records-title {
            font-size: 12px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .records-list {
            list-style: none;
            max-height: 100px;
            overflow-y: auto;
            font-size: 11px;
            color: #aaa;
        }
        .records-list li {
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #333;
        }
        .records-list li:last-child {
            border-bottom: none;
        }
        .record-success { color: #00b578; font-weight: 600; }
        .record-fail { color: #ff4d4f; font-weight: 600; }
        .clear-records-btn {
            font-size: 10px;
            color: #888;
            background: none;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 2px 10px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .clear-records-btn:hover {
            border-color: #ff4d4f;
            color: #ff4d4f;
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-130px);
            z-index: 999;
            padding: 11px 22px;
            border-radius: 22px;
            font-weight: 700;
            font-size: 13px;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #00b578; color: #fff; }
        .toast.fail { background: #ff4d4f; color: #fff; }
        .toast.warning { background: #ff8f1f; color: #fff; }
        .toast.info { background: #4d94ff; color: #fff; }

        /* PC端 */
        @media (min-width: 768px) {
            body {
                padding: 24px;
                align-items: center;
            }
            .app-container {
                width: 90vw;
                max-width: 100%;
                height: 95vh;
                max-height: 100%;
                min-height: 600px;
                flex-direction: row;
                border-radius: 24px;
                margin: 0 auto;
            }
            .header { display: none; }
            .map-wrap {
                flex: 1 1 auto;
                min-width: 0;
                border-radius: 24px 0 0 24px;
                overflow: hidden;
                position: relative;
            }
            .bottom-panel {
                flex: 0 0 420px;
                width: 420px;
                max-height: none;
                height: 100%;
                overflow-y: auto;
                padding: 24px 20px;
                border-left: 1px solid var(--border);
                border-top: none;
                gap: 14px;
                display: flex;
                flex-direction: column;
                background: var(--bg-white);
                border-radius: 0 24px 24px 0;
            }
            .panel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 8px;
            }
            .panel-header .pc-title {
                font-size: 20px;
                font-weight: 700;
                color: var(--text);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .panel-header .status-badge {
                font-size: 13px;
                padding: 6px 14px;
            }
            .address-search input {
                font-size: 14px;
                padding: 10px 14px;
            }
            .address-search .btn-xs {
                font-size: 13px;
                padding: 10px 16px;
            }
            .fence-settings .input-group {
                padding: 8px 12px;
            }
            .fence-settings .input-group label {
                font-size: 11px;
            }
            .fence-settings .input-group input {
                font-size: 13px;
            }
            .copy-btn {
                font-size: 13px;
                padding: 9px 16px;
                border-radius: 16px;
            }
            .radius-row {
                padding: 10px 14px;
                gap: 12px;
            }
            .radius-row label {
                font-size: 12px;
            }
            .radius-row input[type="range"] {
                height: 8px;
            }
            .radius-row input[type="range"]::-webkit-slider-thumb {
                width: 28px;
                height: 28px;
            }
            .radius-input-wrap {
                width: 100px;
                padding: 6px 10px;
            }
            .radius-input-wrap input {
                font-size: 16px;
            }
            .info-item {
                padding: 12px 14px;
            }
            .info-item .val {
                font-size: 22px;
            }
            .btn {
                padding: 13px 16px;
                font-size: 14px;
                border-radius: 24px;
            }
            .records-panel {
                margin-top: 10px;
                border-top: 1px solid #333;
                padding-top: 12px;
            }
            .records-title {
                font-size: 14px;
            }
            .records-list {
                max-height: 130px;
                font-size: 12px;
            }
            .clear-records-btn {
                font-size: 11px;
                padding: 4px 12px;
            }
            .map-tip-bar {
                font-size: 13px;
                padding: 9px 20px;
                top: 18px;
            }
            .crosshair-hint {
                width: 40px;
                height: 40px;
            }
            .crosshair-hint::before {
                width: 30px;
                height: 2px;
                left: 5px;
            }
            .crosshair-hint::after {
                width: 2px;
                height: 30px;
                top: 5px;
            }
        }

        @media (max-width: 400px) {
            .app-container { border-radius: 14px; height: 97vh; }
            .header { padding: 10px 12px; }
            .header .title { font-size: 14px; }
            .bottom-panel { padding: 8px 10px 12px; gap: 6px; }
            .btn { padding: 10px 8px; font-size: 12px; border-radius: 18px; }
            .fence-settings .input-group input { font-size: 11px; }
            .radius-row { padding: 6px 10px; gap: 6px; }
            .radius-row input[type="range"]::-webkit-slider-thumb { width: 22px; height: 22px; }
            .radius-input-wrap { width: 80px; }
            .address-search { padding: 6px 10px; }
            .address-search input { padding: 6px 10px; font-size: 12px; }
            .address-search .btn-xs { padding: 6px 10px; font-size: 11px; }
            .copy-btn { padding: 6px 10px; font-size: 11px; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header mobile-only-header">
        <span class="title"><span class="icon">📍</span>坐标拾取 & 范围预览</span>
        <div class="status-badge unknown" id="statusBadgeMobile">
            <span class="status-dot"></span>
            <span id="statusTextMobile">等待定位</span>
        </div>
    </div>

    <div class="map-wrap" id="mapWrap">
        <div id="container"></div>
        <div class="map-tip-bar" id="mapTip">💡 点击地图拾取坐标 | 长按设围栏中心</div>
        <div class="crosshair-hint" id="crosshair"></div>
    </div>

    <div class="bottom-panel" id="bottomPanel">
        <div class="panel-header pc-only-header" style="display: none;">
            <span class="pc-title"><span class="icon">📍</span>坐标拾取 & 范围预览</span>
            <div class="status-badge unknown" id="statusBadgePC">
                <span class="status-dot"></span>
                <span id="statusTextPC">等待定位</span>
            </div>
        </div>

        <div class="address-search">
            <input type="text" id="addressInput" placeholder="输入地址，如：天安门" />
            <button class="btn-xs primary" id="btnSearchAddress">🔍 搜索</button>
        </div>

        <div class="fence-settings">
            <div class="input-group">
                <label>中心经度</label>
                <input type="number" step="0.000001" id="fenceLng" placeholder="121.499763" lang="en">
            </div>
            <div class="input-group">
                <label>中心纬度</label>
                <input type="number" step="0.000001" id="fenceLat" placeholder="31.239666" lang="en">
            </div>
        </div>

        <div class="copy-row">
            <button class="copy-btn" id="btnCopy" title="复制拾取坐标">📋 复制坐标</button>
        </div>

        <div class="radius-row">
            <label>🔘 半径</label>
            <input type="range" id="radiusSlider" min="10" max="20000" value="1000" step="1">
            <div class="radius-input-wrap">
                <input type="number" id="radiusInput" min="10" max="20000" step="1" value="1000">
                <span>m</span>
            </div>
        </div>

        <div class="info-row">
            <div class="info-item" id="distBox">
                <div>距围栏中心</div>
                <div class="val" id="distVal">--</div>
                <div>米</div>
            </div>
            <div class="info-item">
                <div>围栏半径</div>
                <div class="val" id="radiusVal">1000</div>
                <div>米</div>
            </div>
            <div class="info-item" id="statusInfoBox">
                <div>状态</div>
                <div class="val" id="statusInfoVal">--</div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-outline" id="btnLocate">📡 获取位置</button>
            <button class="btn btn-primary" id="btnManualCheckIn">✅ 模拟打卡</button>
            <button class="btn btn-warn" id="btnReset">🔄 重置</button>
        </div>

        <div class="records-panel" id="recordsPanel">
            <div class="records-title">
                📋 打卡记录
                <button class="clear-records-btn" id="btnClearRecords">清空记录</button>
            </div>
            <ul class="records-list" id="recordsList">
                <li style="color:#aaa;">暂无记录</li>
            </ul>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script charset="utf-8" src="https://map.qq.com/api/gljs?v=1.exp&key=C4MBZ-RM5OH-CNUD2-WAI5F-M3FG5-SNB7G"></script>
<script>
    (function() {
        const STORAGE_KEY = 'fence_app_full_state';

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const saved = JSON.parse(raw);
                    return {
                        fenceCenter: saved.fenceCenter || { lat: 31.239666, lng: 121.499763 },
                        fenceRadius: saved.fenceRadius || 1000,
                        userLatLng: saved.userLatLng || null,
                        records: Array.isArray(saved.records) ? saved.records.slice(0, 20) : [],
                    };
                }
            } catch (e) {}
            return {

            try {

        const saved = loadState();

        const API_KEY = 'C4MBZ-RM5OH-CNUD2-WAI5F-M3FG5-SNB7G';

        function getStatusElements() {
            const isPC = window.matchMedia('(min-width: 768px)').matches;
            return {
                badge: isPC ? statusBadgePC : statusBadgeMobile,
                text: isPC ? statusTextPC : statusTextMobile,
            };
        }

        function calcDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const toRad = deg => deg * Math.PI / 180;
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function checkInside(lat, lng) {
            const dist = calcDistance(lat, lng, state.fenceCenter.lat, state.fenceCenter.lng);
            return { inside: dist <= state.fenceRadius, distance: dist };
        }

        function fmtDist(m) {
            if (m === null || m === undefined) return '--';
            if (m < 1) return '<1';
            if (m >= 1000) return (m / 1000).toFixed(2) + ' km';
            return Math.round(m).toString();
        }

        function fmtCoord(coord, digits = 6) {
            if (coord === null || coord === undefined) return '--';
            return Number(coord).toFixed(digits);
        }

        function timeStr() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        }

            if (state.isInside === true) {

                statusInfoVal.style.color = '#00b578';
            } else if (state.isInside === false) {
                if (badge) badge.classList.add('outside');

                distBox.classList.add('danger');
                statusInfoBox.classList.add('danger');
                statusInfoVal.textContent = '❌ 范围外';
                statusInfoVal.style.color = '#ff4d4f';
            } else {
                if (badge) badge.classList.add('unknown');
                if (text) text.textContent = '等待定位';
                statusInfoBox.classList.add('warning');
                statusInfoVal.textContent = '--';
                statusInfoVal.style.color = '#d48806';
            }
        }

        function updateDistanceUI(dist) {
            distVal.textContent = fmtDist(dist);

        }

        function renderRecords() {

            if (state.records.length === 0) {

            });
            recordsList.innerHTML = html;
        }

        function clearRecords() {
            state.records = [];
            renderRecords();
            saveState();

        }

        function updateAllUI(dist) {

            renderRecords();
        }

        const FENCE_STYLES = {
            default: new TMap.CircleStyle({
                color: 'rgba(77,148,255,0.18)',
                showBorder: true,
                borderColor: 'rgba(77,148,255,0.8)',
                width: 2,

            inside: new TMap.CircleStyle({
                color: 'rgba(0,181,120,0.18)',

                borderColor: 'rgba(0,181,120,0.8)',

            }),
        };

        function updateFenceLayer() {
            if (!fenceLayer) return;
            let styleId = 'default';
            if (state.isInside === true) styleId = 'inside';
            else if (state.isInside === false) styleId = 'outside';
            fenceLayer.setGeometries([{
                styleId: styleId,
                center: new TMap.LatLng(state.fenceCenter.lat, state.fenceCenter.lng),
                radius: state.fenceRadius,
            }]);
        }

        function updateCenterMarker() {
            if (!centerMarkerLayer) return;
            centerMarkerLayer.setGeometries([{
                styleId: 'center',
                position: new TMap.LatLng(state.fenceCenter.lat, state.fenceCenter.lng),
                draggable: true,
            }]);
        }

        function createDotIcon(color, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const half = size / 2;
            const grad = ctx.createRadialGradient(half, half, size * 0.22, half, half, half);
            grad.addColorStop(0, color);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            ctx.beginPath();
            ctx.arc(half, half, size * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(half, half, size * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            return canvas.toDataURL();
        }

        function createCenterIcon() {
            const size = 30;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const cx = size / 2;
            const cy = size / 2;
            ctx.beginPath();
            ctx.arc(cx, cy + 1, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx, cy, 11, 0, Math.PI * 2);
            ctx.fillStyle = '#4d94ff';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.fillStyle = '#4d94ff';
            ctx.fillRect(cx - 1, cy - 4, 2, 8);
            ctx.fillRect(cx - 4, cy - 1, 8, 2);
            return canvas.toDataURL();
        }

        function updateUserMarker() {
            if (!userMarkerLayer) return;
            const colorMap = { true: '#00b578', false: '#ff4d4f', null: '#faad14' };
            const color = colorMap[String(state.isInside)];
            const icon = createDotIcon(color, 26);
            if (state.userLatLng) {
                userMarkerLayer.setStyles({
                    'user': new TMap.MarkerStyle({
                        width: 26, height: 26, anchor: { x: 13, y: 13 }, src: icon,
                    })
                });
                userMarkerLayer.setGeometries([{
                    styleId: 'user',
                    position: new TMap.LatLng(state.userLatLng.lat, state.userLatLng.lng),
                }]);
            } else {
                userMarkerLayer.setGeometries([]);
            }
        }

        function setFenceCenterSilent(lat, lng) {
            state.fenceCenter = { lat, lng };
            updateCenterMarker();
            updateFenceLayer();
            if (state.userLatLng) {
                const result = checkInside(state.userLatLng.lat, state.userLatLng.lng);
                state.isInside = result.inside;
                updateUserMarker();
                updateFenceLayer();
                updateDistanceUI(result.distance);
            } else {
                updateDistanceUI(null);
            }
            updateFenceInputs();
            saveState();
        }

        function setUserPos(lat, lng) {
            state.userLatLng = { lat, lng };
            const result = checkInside(lat, lng);
            state.isInside = result.inside;
            updateUserMarker();
            updateFenceLayer();
            updateAllUI(result.distance);
            const midLat = (lat + state.fenceCenter.lat) / 2;
            const midLng = (lng + state.fenceCenter.lng) / 2;
            const d = calcDistance(lat, lng, state.fenceCenter.lat, state.fenceCenter.lng);
            let zoom = 15;
            if (d > 1000) zoom = 13;
            if (d > 3000) zoom = 11;
            if (d > 8000) zoom = 9;
            map.setCenter(new TMap.LatLng(midLat, midLng));
            map.setZoom(zoom);
            saveState();
        }

        function clearUserPos() {
            state.userLatLng = null;
            state.isInside = null;
            updateUserMarker();
            updateFenceLayer();
            updateAllUI(null);
            map.setCenter(new TMap.LatLng(state.fenceCenter.lat, state.fenceCenter.lng));
            map.setZoom(15);
            mapTip.classList.remove('hidden');
            saveState();
        }

        function pickCoordinate(lat, lng) {
            state.pickedCoord = { lat, lng };
            if (flashTimer) clearTimeout(flashTimer);
            crosshair.classList.add('flash');
            flashTimer = setTimeout(() => crosshair.classList.remove('flash'), 280);
            const currentZoom = map.getZoom();
            if (currentZoom < 15) {
                map.setZoom(15);
            }
            map.setCenter(new TMap.LatLng(lat, lng));
            setFenceCenterSilent(lat, lng);
        }

        function performCheckIn(lat, lng) {
            const result = checkInside(lat, lng);
            state.isInside = result.inside;
            state.records.unshift({ time: timeStr(), success: result.inside, dist: result.distance });
            if (state.records.length > 20) state.records.pop();
            updateAllUI(result.distance);
            if (result.inside) {
                showToast('🎉 打卡成功！在围栏内', 'success');
            } else {
                const over = result.distance - state.fenceRadius;
                showToast(`❌ 打卡失败！超出 ${fmtDist(over)} 米`, 'fail');
            }
            saveState();
        }

        function manualCheckIn() {
            if (!state.userLatLng) {
                showToast('⚠️ 请先获取GPS位置或点击地图设置用户位置', 'warning');
                return;
            }
            performCheckIn(state.userLatLng.lat, state.userLatLng.lng);
        }

        function locateAndSetPosition() {
            if (!navigator.geolocation) {
                showToast('⚠️ 浏览器不支持GPS', 'warning');
                return;
            }
            btnLocate.disabled = true;
            btnLocate.textContent = '⏳ 定位中';
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    setUserPos(lat, lng);
                    state.pickedCoord = { lat, lng };
                    mapTip.classList.add('hidden');
                    btnLocate.disabled = false;
                    btnLocate.textContent = '📡 获取位置';
                    showToast('📍 定位成功，可点击"手动打卡"', 'success');
                },
                err => {
                    let msg = '❌ 定位失败';
                    if (err.code === 1) msg = '❌ 定位权限被拒绝';
                    else if (err.code === 2) msg = '❌ 无法获取位置信息';
                    else if (err.code === 3) msg = '⏰ 定位超时';
                    showToast(msg, 'fail');
                    btnLocate.disabled = false;
                    btnLocate.textContent = '📡 获取位置';
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
            );
        }

        function geocodeAddressFallback(address, callback) {
            const url = `https://apis.map.qq.com/ws/geocoder/v1/?address=${encodeURIComponent(address)}&key=${API_KEY}&output=jsonp&callback=handleGeocode`;
            const script = document.createElement('script');
            window.handleGeocode = function(data) {
                if (data.status === 0 && data.result && data.result.location) {
                    const loc = data.result.location;
                    callback(null, { lat: loc.lat, lng: loc.lng });
                } else {
                    callback(new Error(data.message || '未找到地址'));
                }
                document.head.removeChild(script);
                delete window.handleGeocode;
            };
            script.src = url;
            script.onerror = () => {
                callback(new Error('网络请求失败'));
                document.head.removeChild(script);
                delete window.handleGeocode;
            };
            document.head.appendChild(script);
        }

        function searchAddress() {
            const address = addressInput.value.trim();
            if (!address) {
                showToast('⚠️ 请输入地址', 'warning');
                return;
            }
            btnSearchAddress.disabled = true;
            btnSearchAddress.textContent = '⏳ 搜索中';

            const doSearch = (callback) => {
                if (geocoder) {
                    geocoder.getLocation({ address }).then(result => {
                        if (result && result.location) {
                            callback(null, { lat: result.location.lat, lng: result.location.lng });
                        } else {
                            callback(new Error('未找到该地址'));
                        }
                    }).catch(err => {
                        callback(err);
                    });
                } else {
                    geocodeAddressFallback(address, callback);
                }
            };

            doSearch((err, location) => {
                btnSearchAddress.disabled = false;
                btnSearchAddress.textContent = '🔍 搜索';
                if (err) {
                    showToast('❌ ' + (err.message || '搜索失败'), 'fail');
                    return;
                }
                pickCoordinate(location.lat, location.lng);
                mapTip.classList.add('hidden');
                showToast('📍 地址定位成功', 'success');
            });
        }

        function copyPickedCoord() {
            if (!state.pickedCoord) {
                showToast('⚠️ 请先通过地图点击或GPS定位获取坐标', 'warning');
                return;
            }
            const text = `${fmtCoord(state.pickedCoord.lng)},${fmtCoord(state.pickedCoord.lat)}`;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(onCopySuccess).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try { document.execCommand('copy'); onCopySuccess(); } catch (e) { showToast('⚠️ 复制失败', 'warning'); }
            document.body.removeChild(textarea);
        }

        function onCopySuccess() {
            btnCopy.classList.add('copied');
            btnCopy.innerHTML = '✅ 已复制';
            showToast('📋 坐标已复制到剪贴板', 'success');
            if (copyFeedbackTimer) clearTimeout(copyFeedbackTimer);
            copyFeedbackTimer = setTimeout(() => {
                btnCopy.classList.remove('copied');
                btnCopy.innerHTML = '📋 复制坐标';
            }, 2000);
        }

        function bindCrosshairFollow() {
            const container = document.getElementById('container');
            if (!container || !crosshair) return;
            container.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                crosshair.style.left = x + 'px';
                crosshair.style.top = y + 'px';
                crosshair.classList.add('visible');
            });
            container.addEventListener('mouseleave', () => {
                crosshair.classList.remove('visible');
            });
            container.addEventListener('touchstart', () => {
                crosshair.classList.remove('visible');
            }, { passive: true });
        }

        function initMap() {
            const center = new TMap.LatLng(state.fenceCenter.lat, state.fenceCenter.lng);
            // 夜间模式：mapStyleId: 'style2'
            map = new TMap.Map('container', {
                zoom: 15,
                center: center,
                viewMode: '2D',
                mapStyleId: 'style1'
            });

            try {
                if (TMap.service && TMap.service.Geocoder) {
                    geocoder = new TMap.service.Geocoder();
                } else {
                    console.warn('TMap.service.Geocoder 不可用，将使用备用 WebService API');
                }
            } catch (e) {
                console.warn('初始化地理编码失败，使用备用方案', e);
            }

            fenceLayer = new TMap.MultiCircle({
                map,
                styles: FENCE_STYLES,
                geometries: [{ styleId: 'default', center: center, radius: state.fenceRadius }],
            });

            centerMarkerLayer = new TMap.MultiMarker({
                map,
                styles: {
                    'center': new TMap.MarkerStyle({
                        width: 30, height: 30, anchor: { x: 15, y: 15 }, src: createCenterIcon(),
                    })
                },
                geometries: [{ styleId: 'center', position: center, draggable: true }],
            });

            centerMarkerLayer.on('dragend', (evt) => {
                if (evt.geometry && evt.geometry.position) {
                    const newLat = evt.geometry.position.getLat();
                    const newLng = evt.geometry.position.getLng();
                    setFenceCenterSilent(newLat, newLng);
                    showToast('📍 围栏中心已移动', 'info');
                }
            });

            userMarkerLayer = new TMap.MultiMarker({
                map,
                styles: {
                    'user': new TMap.MarkerStyle({
                        width: 26, height: 26, anchor: { x: 13, y: 13 }, src: createDotIcon('#faad14', 26),
                    })
                },
                geometries: [],
            });

            if (state.userLatLng) {
                const { lat, lng } = state.userLatLng;
                state.pickedCoord = { lat, lng };
                const result = checkInside(lat, lng);
                state.isInside = result.inside;
                updateUserMarker();
                updateFenceLayer();
                updateDistanceUI(result.distance);
                updateStatusUI();
                renderRecords();
            }

            map.on('click', (evt) => {
                if (evt.latLng) {
                    const lat = evt.latLng.getLat();
                    const lng = evt.latLng.getLng();
                    pickCoordinate(lat, lng);
                    mapTip.classList.add('hidden');
                }
            });

            map.on('longpress', (evt) => {
                if (evt.latLng) {
                    const lat = evt.latLng.getLat();
                    const lng = evt.latLng.getLng();
                    pickCoordinate(lat, lng);
                    mapTip.classList.add('hidden');
                }
            });
            map.on('rightclick', (evt) => {
                if (evt.latLng) {
                    const lat = evt.latLng.getLat();
                    const lng = evt.latLng.getLng();
                    pickCoordinate(lat, lng);
                    mapTip.classList.add('hidden');
                }
            });

            updateAllUI(null);
            updateFenceInputs();

            bindCrosshairFollow();
            handleResponsiveHeader();
            window.addEventListener('resize', handleResponsiveHeader);
        }

        function handleResponsiveHeader() {
            const isPC = window.matchMedia('(min-width: 768px)').matches;
            const mobileHeader = document.querySelector('.mobile-only-header');
            const pcHeader = document.querySelector('.pc-only-header');
            if (mobileHeader) mobileHeader.style.display = isPC ? 'none' : 'flex';
            if (pcHeader) pcHeader.style.display = isPC ? 'flex' : 'none';
            updateStatusUI();
        }

        btnCopy.addEventListener('click', copyPickedCoord);
        btnLocate.addEventListener('click', locateAndSetPosition);
        btnManualCheckIn.addEventListener('click', manualCheckIn);
        btnReset.addEventListener('click', () => {
            clearUserPos();
            state.pickedCoord = null;
            showToast('🔄 用户位置已重置', 'warning');
        });
        btnClearRecords.addEventListener('click', clearRecords);
        btnSearchAddress.addEventListener('click', searchAddress);
        addressInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchAddress();
            }
        });

        radiusSlider.addEventListener('input', () => {
            const val = parseInt(radiusSlider.value, 10);
            radiusInput.value = val;
            radiusVal.textContent = val;
        });
        radiusSlider.addEventListener('change', () => {
            const val = parseInt(radiusSlider.value, 10);
            setFenceRadius(val);
        });
        radiusInput.addEventListener('input', () => {
            let val = parseInt(radiusInput.value, 10);
            if (isNaN(val)) return;
            if (val < 10) val = 10;
            if (val > 20000) val = 20000;
            radiusSlider.value = val;
            radiusVal.textContent = val;
        });
        radiusInput.addEventListener('change', () => {
            let val = parseInt(radiusInput.value, 10);
            if (isNaN(val)) val = state.fenceRadius;
            val = Math.min(20000, Math.max(10, val));
            radiusInput.value = val;
            setFenceRadius(val);
        });
        radiusInput.addEventListener('blur', () => {
            let val = parseInt(radiusInput.value, 10);
            if (isNaN(val)) val = state.fenceRadius;
            val = Math.min(20000, Math.max(10, val));
            radiusInput.value = val;
            setFenceRadius(val);
        });

        function setFenceRadius(radius) {
            const r = Math.min(20000, Math.max(10, parseInt(radius) || 10));
            state.fenceRadius = r;
            if (state.userLatLng) {
                const result = checkInside(state.userLatLng.lat, state.userLatLng.lng);
                state.isInside = result.inside;
                updateUserMarker();
                updateFenceLayer();
                updateAllUI(result.distance);
            } else {
                updateFenceLayer();
                updateAllUI(null);
            }
            saveState();
        }

        function onFenceCenterInputChange() {
            const lat = parseFloat(fenceLatInput.value);
            const lng = parseFloat(fenceLngInput.value);
            if (isNaN(lat) || isNaN(lng)) return;
            if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                showToast('⚠️ 经纬度范围不合法', 'warning');
                return;
            }
            setFenceCenter(lat, lng);
        }
        function setFenceCenter(lat, lng) {
            setFenceCenterSilent(lat, lng);
            showToast('✅ 围栏中心已更新', 'success');
        }
        fenceLatInput.addEventListener('change', onFenceCenterInputChange);
        fenceLngInput.addEventListener('change', onFenceCenterInputChange);
        fenceLatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') onFenceCenterInputChange(); });
        fenceLngInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') onFenceCenterInputChange(); });

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.activeElement === document.body) {
                e.preventDefault();
                manualCheckIn();
            }
            if (e.key === 'c' && e.ctrlKey && state.pickedCoord) {
                e.preventDefault();
                copyPickedCoord();
            }
        });

        if (typeof TMap !== 'undefined') {
            initMap();
        } else {
            $('container').innerHTML = '<div style="padding:40px;text-align:center;color:#ff4d4f;">⚠️ 腾讯地图API加载失败</div>';
        }
    })();
</script>
</body>
</html>
